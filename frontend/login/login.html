<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body class="login-bg">
    <div class="container">
        <div class="row vh-100 d-flex justify-content-center align-items-center">
            <div class="col-md-4">
                <div class="box">
                    <h3 class="log-logo">
                        BuildStock
                    </h3>
                    <h4 class="head">
                        Sign in to your account
                    </h4>
                    <p class="sub">
                        Construction Inventory System
                    </p>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" id="username" class="form-control inp" placeholder="example@gmail.com">
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <div class="pass-box">
                                <input type="password" id="password" class="form-control inp" placeholder="Enter password">
                                <span class="eye" onclick="showPass()">
                                    <i id="eyeicon" class="bi bi-eye"></i>
                                </span>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn1">
                                Sign In
                            </button>
                        </div>

                        <p class="text-center mt-3 forgot">
                            Forgot Password?
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
